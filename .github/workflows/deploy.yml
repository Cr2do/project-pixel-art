name: Build & Deploy to GKE

on:
  workflow_dispatch:

env:
  REGION: europe-west1
  ZONE: europe-west1-b
  CLUSTER: pixel-board-cluster
  REGISTRY: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/reactive-pixel-board-registry
  NAMESPACE: pixel-board

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push API image
        run: |
          docker build \
            -f packages/api/Dockerfile \
            -t ${{ env.REGISTRY }}/api:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/api:latest \
            .
          docker push ${{ env.REGISTRY }}/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/api:latest

      - name: Build & Push Client image
        run: |
          docker build \
            -f packages/client/Dockerfile \
            -t ${{ env.REGISTRY }}/client:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/client:latest \
            .
          docker push ${{ env.REGISTRY }}/client:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/client:latest

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get static IPs from Terraform
        id: terraform
        working-directory: deployment/terraform
        run: |
          terraform init -reconfigure
          echo "api_ip=$(terraform output -raw api_external_ip)" >> $GITHUB_OUTPUT
          echo "client_ip=$(terraform output -raw client_external_ip)" >> $GITHUB_OUTPUT

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --zone ${{ env.ZONE }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install pixel-board deployment/helm/pixel-board \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set image.project=${{ secrets.GCP_PROJECT_ID }} \
            --set image.tag=${{ github.sha }} \
            --set api.jwtSecret=${{ secrets.JWT_SECRET }} \
            --set api.staticIp=${{ steps.terraform.outputs.api_ip }} \
            --set client.staticIp=${{ steps.terraform.outputs.client_ip }} \
            --set client.apiUrl=http://${{ steps.terraform.outputs.api_ip }}:8000 \
            --wait \
            --timeout 3m

      - name: Show service endpoints
        run: kubectl get svc -n ${{ env.NAMESPACE }}
