name: Deploy to GKE

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (github SHA or 'latest')"
        required: false
        default: "latest"

env:
  REGION: europe-west1
  ZONE: europe-west1-b
  CLUSTER: pixel-board-cluster
  REGISTRY: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/reactive-pixel-board-registry
  NAMESPACE: pixel-board

jobs:
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --zone ${{ env.ZONE }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install pixel-board deployment/helm/pixel-board \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set image.project=${{ secrets.GCP_PROJECT_ID }} \
            --set image.tag=${{ github.event.inputs.image_tag }} \
            --set api.jwtSecret=${{ secrets.JWT_SECRET }} \
            --set api.staticIp=${{ vars.API_EXTERNAL_IP }} \
            --set client.staticIp=${{ vars.CLIENT_EXTERNAL_IP }} \
            --set client.apiUrl=http://${{ vars.API_EXTERNAL_IP }}:8000 \
            --wait \
            --timeout 8m

      - name: Show service endpoints
        run: kubectl get svc -n ${{ env.NAMESPACE }}
