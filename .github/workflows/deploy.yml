name: Deploy to VM

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag à déployer (SHA ou 'latest')"
        required: false
        default: "latest"

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Générer le fichier .env.prod
        run: |
          cat > docker/.env.prod << EOF
          MONGO_ROOT_USERNAME=admin
          MONGO_ROOT_PASSWORD=${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGO_DATABASE=pixelboard
          API_PORT=8000
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=7d
          CANVAS_MAX_WIDTH=5000
          CLIENT_URL=http://${{ vars.SERVER_IP }}
          FRONTEND_APP_URL=http://${{ vars.SERVER_IP }}
          RESET_TOKEN_TTL_MS=3600000
          ADMIN_EMAIL=${{ vars.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_SECURE=false
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_USER }}
          VITE_API_URL=http://${{ vars.SERVER_IP }}:8000/api
          IMAGE_TAG=${{ github.event.inputs.image_tag }}
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          EOF

      - name: Copier les fichiers sur la VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_IP }}
          username: deploy
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: "docker/docker-compose.prod.yml,docker/.env.prod"
          target: /home/deploy/

      - name: Déployer
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_IP }}
          username: deploy
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
            cd /home/deploy/docker
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
            docker compose -f docker-compose.prod.yml --env-file .env.prod ps
