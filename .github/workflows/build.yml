name: Build & Push Docker Images

on:
  workflow_dispatch:

env:
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/reactive-pixel-board-registry

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push API image
        run: |
          docker build \
            -f packages/api/Dockerfile \
            -t ${{ env.REGISTRY }}/api:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/api:latest \
            .
          docker push ${{ env.REGISTRY }}/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/api:latest

      - name: Build & Push Client image
        run: |
          docker build \
            -f packages/client/Dockerfile \
            -t ${{ env.REGISTRY }}/client:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/client:latest \
            .
          docker push ${{ env.REGISTRY }}/client:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/client:latest
