name: pixel-board

services:

  # ── MongoDB ─────────────────────────────────────────────
  mongodb:
    image: mongo:8.0
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongo_data:/data/db
    networks:
      - pixel-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── API (Express) ────────────────────────────────────────
  api:
    image: europe-west1-docker.pkg.dev/${GCP_PROJECT_ID}/reactive-pixel-board-registry/api:${IMAGE_TAG:-latest}
    container_name: api
    restart: unless-stopped
    environment:
      PORT: ${API_PORT}
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DATABASE}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      CANVAS_MAX_WIDTH: ${CANVAS_MAX_WIDTH}
      CLIENT_URL: ${CLIENT_URL}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL}
      RESET_TOKEN_TTL_MS: ${RESET_TOKEN_TTL_MS:-3600000}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - pixel-net

  # ── Client (React/nginx) ─────────────────────────────────
  client:
    image: europe-west1-docker.pkg.dev/${GCP_PROJECT_ID}/reactive-pixel-board-registry/client:${IMAGE_TAG:-latest}
    container_name: client
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - pixel-net

volumes:
  mongo_data:

networks:
  pixel-net:
    driver: bridge
