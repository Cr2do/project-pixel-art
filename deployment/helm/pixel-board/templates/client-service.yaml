apiVersion: v1
kind: Service
metadata:
  name: client-service
  namespace: {{ .Values.namespace }}
  labels:
    app: client
    {{- include "pixel-board.labels" . | nindent 4 }}
spec:
  type: LoadBalancer
  loadBalancerIP: {{ .Values.client.staticIp }}
  selector:
    app: client
  ports:
    - port: 80
      targetPort: 80
