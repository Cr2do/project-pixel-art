apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "pixel-board.labels" . | nindent 4 }}
type: Opaque
data:
  MONGO_ROOT_USERNAME: {{ .Values.mongodb.rootUsername | b64enc | quote }}
  MONGO_ROOT_PASSWORD: {{ .Values.mongodb.rootPassword | b64enc | quote }}
