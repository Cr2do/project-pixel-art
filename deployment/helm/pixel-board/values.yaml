namespace: pixel-board

# ── Images ───────────────────────────────────────────────
image:
  registry: europe-west1-docker.pkg.dev
  project: YOUR_PROJECT_ID
  repository: reactive-pixel-board-registry
  tag: latest
  pullPolicy: Always

# ── MongoDB ──────────────────────────────────────────────
mongodb:
  image: mongo:8.0
  rootUsername: admin
  rootPassword: changeme
  database: pixelboard
  storage: 5Gi
  storageClass: standard-rwo
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# ── API (Express) ────────────────────────────────────────
api:
  replicas: 1
  port: 8000
  staticIp: ""
  jwtSecret: changeme_jwt_secret
  jwtExpiresIn: "7d"
  canvasMaxWidth: "5000"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# ── Client (React/nginx) ─────────────────────────────────
client:
  replicas: 1
  staticIp: ""
  apiUrl: "http://localhost:8000"
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "64Mi"
      cpu: "50m"
